name: Feature request
description: Suggest an improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: I'm mostly maintaining this for my own home — happy to hear ideas, but big UI rewrites are unlikely in v1.0.

  - type: textarea
    id: problem
    attributes:
      label: What would this help with?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Rough idea
    validations:
      required: true

  - type: dropdown
    id: design-impact
    attributes:
      label: Changes how it looks?
      options:
        - "No — docs, config, or generator only"
        - "Yes — layout or colours"
    validations:
      required: true
