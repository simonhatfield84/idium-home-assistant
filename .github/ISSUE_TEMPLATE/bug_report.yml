name: Bug report
description: Something broken in the themes or generator
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Idium version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      placeholder: "2024.x.x"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: What you did
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What happened instead
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / console (if any)
      render: shell
